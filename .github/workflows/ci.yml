name: Rails CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

jobs:
  rspec:
    name: RSpec tests (with coverage >= 90%)
    runs-on: ubuntu-latest

    env:
      RAILS_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.5'
          bundler-cache: true

      - name: Install system dependencies (SQLite)
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Set up Node (if you use JS/CSS bundlers)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies (optional)
        if: hashFiles('package.json') != ''
        run: npm install

      - name: Prepare test database
        run: bin/rails db:prepare

      - name: Run RSpec
        run: bundle exec rspec

  cucumber:
    name: Cucumber acceptance tests
    runs-on: ubuntu-latest

    env:
      RAILS_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.5'
          bundler-cache: true

      - name: Install system dependencies (SQLite)
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Prepare test database
        run: bin/rails db:prepare

      - name: Run Cucumber
        run: bundle exec cucumber

  rubocop:
    name: RuboCop lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.5'
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rubocop

  brakeman:
    name: Brakeman security scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.5'
          bundler-cache: true

      - name: Run Brakeman
        run: bundle exec brakeman --no-progress --exit-on-warn

  bundle_audit:
    name: Bundler Audit (vulnerable gems)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.5'
          bundler-cache: true

      - name: Install bundler-audit
        run: |
          gem install bundler-audit
          bundle audit update

      - name: Run bundler-audit
        run: bundle audit check --update
